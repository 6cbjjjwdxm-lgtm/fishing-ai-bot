name: Update places cache

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # каждый день 03:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Update cache
        env:
          RUSFISHING_COOKIE: ${{ secrets.RUSFISHING_COOKIE }}
        run: |
          python -c "import asyncio, scraper; asyncio.run(scraper.update_rusfishing_cache())"

      - name: Commit cache if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add places_cache.json
          git diff --cached --quiet || git commit -m "Update places_cache.json"
          git push
